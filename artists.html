<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artists | Paper Vinyl Records</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav id="top-menu" class="visible">
    <img src="images/pvrtransparent.png" class="nav-logo">
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="artists.html">Artists</a>
        <a href="releases.html">Releases</a>
        <a href="shop.html">Shop</a>
    </div>
</nav>

<div class="content-wrapper">
    <h1 class="page-title">The Roster</h1>
    <div class="artist-grid">
        <div class="artist-card" onclick="openArtist('wilrhy')">
            <img src="images/wilrhy.jpg" alt="WilRhy">
            <h3>WilRhy</h3>
        </div>
        <!-- Repeat for Frostability, undyingbear, TwistedAnimations, SmiteBite -->
    </div>
</div>

<div id="artist-modal" class="modal-overlay">
    <div class="modal-zoom-box" id="modal-box">
        <span class="close-btn" onclick="closeArtist()">&times;</span>
        <div class="modal-content">
            <img id="modal-img" src="">
            <div class="modal-info">
                <h2 id="modal-name"></h2>
                <div id="modal-desc" class="cursor-blink"></div>
                <div class="modal-links" style="margin-top:20px;">
                    <a href="#" id="modal-spotify" target="_blank" style="color:#121212; margin-right:15px;">Spotify</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="artists-script.js"></script>
</body>
</html>
