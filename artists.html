<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artists | Paper Vinyl Records</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav id="top-menu" class="visible">
    <img src="images /pvrtransparent.png" class="nav-logo">
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="artists.html">Artists</a>
        <a href="releases.html">Releases</a>
        <a href="shop.html">Shop</a>
    </div>
</nav>

<div class="content-wrapper">
    <h1 class="page-title">The Roster</h1>
    <div class="artist-grid">
        <div class="artist-card" onclick="openArtist('wilrhy')">
            <img src="images /wilrhy.jpg" alt="WilRhy">
            <h3>WilRhy</h3>
        </div>
        <div class="artist-card" onclick="openArtist('frostability')">
            <img src="images /frostability.jpg" alt="Frostability">
            <h3>Frostability</h3>
        </div>
        <div class="artist-card" onclick="openArtist('undyingbear')">
            <img src="images /undyingbear.jpg" alt="undyingbear">
            <h3>undyingbear</h3>
        </div>
        <div class="artist-card" onclick="openArtist('twistedanimations')">
            <img src="images /twistedanimations.jpg" alt="TwistedAnimations">
            <h3>TwistedAnimations</h3>
        </div>
        <div class="artist-card" onclick="openArtist('smitebite')">
            <img src="images /smitebite.jpg" alt="SmiteBite">
            <h3>SmiteBite</h3>
        </div>
    </div>
</div>

<div id="artist-modal" class="modal-overlay">
    <div class="modal-zoom-box" id="modal-box">
        <span class="close-btn" onclick="closeArtist()">&times;</span>
        <div class="modal-content">
            <img id="modal-img" src="">
            <div class="modal-info">
                <h2 id="modal-name"></h2>
                <!-- Description where you will write your bios -->
                <div id="modal-desc" class="cursor-blink"></div>
                <!-- Container for Spotify, SoundCloud, and Insta icons -->
                <div class="modal-links"></div> 
            </div>
        </div>
    </div>
</div>

<script src="artists-script.js"></script>
</body>
</html>
