<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Vinyl Records</title>
    <style>
        body { margin: 0; background: #121212; color: white; font-family: 'Courier New', Courier, monospace; }
        
        /* The "Scroll to Enter" Screen */
        #entry-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 200; background: #121212;
            transition: opacity 0.6s ease-out, visibility 0.6s;
            letter-spacing: 2px; text-transform: uppercase;
        }
        .entry-text { font-size: 1.5rem; font-weight: 300; color: #f0f0f0; }
        .scroll-arrow { margin-top: 20px; font-size: 2rem; animation: bounce 2s infinite; }
        .hide-entry { opacity: 0; visibility: hidden; }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        /* Layout */
        .scroll-tall { height: 800vh; } 
        .sticky-center {
            position: sticky; top: 0; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .label-logo {
            position: absolute; top: 30px; left: 30px; width: 120px;
            z-index: 100; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        .scene {
            position: absolute; opacity: 0; transition: opacity 0.5s;
            display: flex; flex-direction: column; align-items: center; width: 100%;
        }
        .scene.active { opacity: 1; }

        /* Ripping Animation */
        .rip-wrapper { position: relative; width: 400px; height: 400px; }
        .cover-half {
            position: absolute; width: 100%; height: 50%;
            background-size: 400px 400px;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .top { 
            top: 0; background-position: top;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 80% 92%, 60% 100%, 40% 92%, 20% 100%, 0 92%);
        }
        .bottom { 
            bottom: 0; background-position: bottom;
            clip-path: polygon(0 8%, 20% 0, 40% 8%, 60% 0, 80% 8%, 100% 0, 100% 100%, 0 100%);
        }
        .ripped .top { transform: translateY(-130%) rotate(-12deg); opacity: 0; }
        .ripped .bottom { transform: translateY(130%) rotate(12deg); opacity: 0; }

        .artist-reveal {
            position: absolute; z-index: -1; text-align: center;
            transform: scale(0.9); transition: 0.8s; opacity: 0;
        }
        .ripped + .artist-reveal { transform: scale(1); opacity: 1; }
        .artist-reveal img { width: 350px; border-radius: 2px; }
    </style>
</head>
<body>

<div id="entry-screen">
    <h1 class="entry-text">scroll to enter!</h1>
    <div class="scroll-arrow">↓</div>
</div>

<div class="scroll-tall">
    <div class="sticky-center">
        <img src="images /pvrtransparent.png" class="label-logo">

        <!-- Artist 1 -->
        <div class="scene">
            <div class="rip-wrapper">
                <div class="cover-half top" style="background-image:url('images/ARTIST_1_COVER.jpg')"></div>
                <div class="cover-half bottom" style="background-image:url('images/ARTIST_1_COVER.jpg')"></div>
            </div>
            <div class="artist-reveal">
                <img src="images/ARTIST_1_PHOTO.jpg">
                <h2>ARTIST ONE</h2>
                <h2>presents</h2>
                <h2>ALBUM ONE</h2>
            </div>
        </div>

        <!-- Artist 2 -->
        <div class="scene">
            <div class="rip-wrapper">
                <div class="cover-half top" style="background-image:url('images/ARTIST_2_COVER.jpg')"></div>
                <div class="cover-half bottom" style="background-image:url('images/ARTIST_2_COVER.jpg')"></div>
            </div>
            <div class="artist-reveal">
                <img src="images/ARTIST_2_PHOTO.jpg">
                <h2>ARTIST TWO</h2>
                <h2>presents</h2>
                <h2>ALBUM TWO</h2>
            </div>
        </div>

        <!-- Artist 3 -->
        <div class="scene">
            <div class="rip-wrapper">
                <div class="cover-half top" style="background-image:url('images/ARTIST_3_COVER.jpg')"></div>
                <div class="cover-half bottom" style="background-image:url('images/ARTIST_3_COVER.jpg')"></div>
            </div>
            <div class="artist-reveal">
                <img src="images/ARTIST_3_PHOTO.jpg">
                <h2>ARTIST THREE</h2>
                <h2>presents</h2>
                <h2>ALBUM THREE</h2>
            </div>
        </div>

        <!-- Contact Section -->
        <div class="scene">
            <h1>Paper Vinyl Records</h1>
            <p>Demos: papervinyl@musician.org</p>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
