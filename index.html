<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Vinyl Records</title>
    <style>
        body { margin: 0; background: #121212; color: white; font-family: 'Courier New', Courier, monospace; }
        
        /* NAVIGATION MENU */
        #top-menu {
            position: fixed;
            top: -80px;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(18, 18, 18, 0.95);
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between; /* Space for Logo and Links */
            align-items: center;
            padding: 0 50px;
            z-index: 300;
            transition: top 0.5s ease-in-out;
            box-sizing: border-box;
        }

        #top-menu.visible { top: 0; }

        /* Small Logo inside Nav */
        .nav-logo {
            height: 40px;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        #top-menu.visible .nav-logo { opacity: 1; }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            border: 1px solid transparent;
            padding: 5px 10px;
            transition: 0.3s;
        }
        .nav-links a:hover { border: 1px solid white; background: white; color: black; }

        /* Main Logo Fade Out */
        .label-logo {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 120px;
            z-index: 100;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
            transition: opacity 0.5s ease-in-out;
        }
        .label-logo.fade-out { opacity: 0; pointer-events: none; }

        /* Existing Styles */
        #entry-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; background: #121212; transition: opacity 0.6s ease-out, visibility 0.6s; letter-spacing: 2px; text-transform: uppercase; }
        .entry-text { font-size: 1.5rem; font-weight: 300; color: #f0f0f0; }
        .scroll-arrow { margin-top: 20px; font-size: 2rem; animation: bounce 2s infinite; }
        .hide-entry { opacity: 0; visibility: hidden; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }
        .scroll-tall { height: 800vh; }
        .sticky-center { position: sticky; top: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .scene { position: absolute; opacity: 0; transition: opacity 0.5s; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .scene.active { opacity: 1; }
        .rip-wrapper { position: relative; width: 400px; height: 400px; }
        .cover-half { position: absolute; width: 100%; height: 50%; background-size: 400px 400px; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .top { top: 0; background-position: top; clip-path: polygon(0 0, 100% 0, 100% 100%, 80% 92%, 60% 100%, 40% 92%, 20% 100%, 0 92%); }
        .bottom { bottom: 0; background-position: bottom; clip-path: polygon(0 8%, 20% 0, 40% 8%, 60% 0, 80% 8%, 100% 0, 100% 100%, 0 100%); }
        .ripped .top { transform: translateY(-130%) rotate(-12deg); opacity: 0; }
        .ripped .bottom { transform: translateY(130%) rotate(12deg); opacity: 0; }
        .artist-reveal { position: absolute; z-index: -1; text-align: center; transform: scale(0.9); transition: 0.8s; opacity: 0; }
        .ripped + .artist-reveal { transform: scale(1); opacity: 1; }
        .artist-reveal img { width: 350px; border-radius: 2px; }
    </style>
</head>
<body>

<nav id="top-menu">
    <img src="images /pvrtransparent.png" class="nav-logo">
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="artists.html">Artists</a>
        <a href="releases.html">Releases</a>
        <a href="shop.html">Shop</a>
    </div>
</nav>

<div id="entry-screen">
    <h1 class="entry-text">scroll to enter!</h1>
    <div class="scroll-arrow">↓</div>
</div>

<div class="scroll-tall">
    <div class="sticky-center">
        <!-- Main Logo with ID for JS control -->
        <img src="images /pvrtransparent.png" class="label-logo" id="main-logo">

        <!-- Artist Scenes -->
        <div class="scene">
            <div class="rip-wrapper">
                <div class="cover-half top" style="background-image:url('images/ARTIST_1_COVER.jpg')"></div>
                <div class="cover-half bottom" style="background-image:url('images/ARTIST_1_COVER.jpg')"></div>
            </div>
            <div class="artist-reveal">
                <img src="images/ARTIST_1_PHOTO.jpg">
                <h2>ARTIST ONE</h2>
                <h2>presents</h2>
                <h2>ALBUM ONE</h2>
            </div>
        </div>

        <div class="scene">
            <div class="rip-wrapper">
                <div class="cover-half top" style="background-image:url('images/ARTIST_2_COVER.jpg')"></div>
                <div class="cover-half bottom" style="background-image:url('images/ARTIST_2_COVER.jpg')"></div>
            </div>
            <div class="artist-reveal">
                <img src="images/ARTIST_2_PHOTO.jpg">
                <h2>ARTIST TWO</h2>
                <h2>presents</h2>
                <h2>ALBUM TWO</h2>
            </div>
        </div>

        <div class="scene">
            <div class="rip-wrapper">
                <div class="cover-half top" style="background-image:url('images/ARTIST_3_COVER.jpg')"></div>
                <div class="cover-half bottom" style="background-image:url('images/ARTIST_3_COVER.jpg')"></div>
            </div>
            <div class="artist-reveal">
                <img src="images/ARTIST_3_PHOTO.jpg">
                <h2>ARTIST THREE</h2>
                <h2>presents</h2>
                <h2>ALBUM THREE</h2>
            </div>
        </div>

        <!-- Contact Section -->
        <div class="scene">
            <h1>Paper Vinyl Records</h1>
            <p>Demos: papervinyl@musician.org</p>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
