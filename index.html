<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Vinyl Records</title>
    <style>
        /* --- GLOBAL --- */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #121212; color: white; 
            font-family: 'Courier New', Courier, monospace; 
        }

        /* --- THE STAGE (Locked to Screen) --- */
        #main-stage {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            z-index: 10; pointer-events: none; /* Allows scroll to pass through */
        }

        /* --- THE SCROLL TRACK (Creates the height) --- */
        #scroll-track { height: 800vh; position: relative; z-index: 1; }

        /* --- MENU & LINKS (Forcing White) --- */
        #top-menu {
            position: fixed; top: -80px; left: 0; width: 100%; height: 70px;
            background: rgba(18, 18, 18, 0.9); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 50px; z-index: 100; transition: top 0.5s ease; box-sizing: border-box;
            pointer-events: all;
        }
        #top-menu.visible { top: 0; }
        .nav-links a:link, .nav-links a:visited { color: white !important; text-decoration: none; margin-left: 20px; text-transform: uppercase; font-size: 0.8rem; }
        .nav-links a:hover { color: #00ff00 !important; }

        /* --- LOGO --- */
        .label-logo { position: absolute; top: 30px; left: 30px; width: 120px; transition: 0.5s; opacity: 1; }
        .label-logo.hidden { opacity: 0; transform: translateY(-20px); }
        .nav-logo { height: 40px; }

        /* --- SCENES --- */
        .scene {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: opacity 0.5s;
        }
        .scene.active { opacity: 1; visibility: visible; }

        /* --- RIP ANIMATION --- */
        .rip-wrapper { position: relative; width: 350px; height: 350px; }
        .cover-half { 
            position: absolute; width: 100%; height: 50%; 
            background-size: 350px 350px; transition: transform 0.8s; 
        }
        .top-half { top: 0; clip-path: polygon(0 0, 100% 0, 100% 100%, 80% 90%, 60% 100%, 40% 90%, 20% 100%, 0 90%); }
        .bottom-half { bottom: 0; clip-path: polygon(0 10%, 20% 0, 40% 10%, 60% 0, 80% 10%, 100% 0, 100% 100%, 0 100%); }
        
        .ripped .top-half { transform: translateY(-120%) rotate(-5deg); }
        .ripped .bottom-half { transform: translateY(120%) rotate(5deg); }

        .artist-reveal { 
            position: absolute; z-index: -1; text-align: center; 
            opacity: 0; transform: scale(0.8); transition: 0.8s; 
        }
        .ripped + .artist-reveal { opacity: 1; transform: scale(1); }
        .artist-reveal img { width: 300px; border-radius: 4px; }

        /* --- ENTRY SCREEN --- */
        #entry-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; 
            background: #121212; z-index: 1000; display: flex; 
            justify-content: center; align-items: center; transition: 0.8s;
        }
    </style>
</head>
<body>

    <audio id="vinyl-crackle" src="crackle.mp3" loop></audio>

    <div id="entry-screen"><h1>SCROLL TO ENTER</h1></div>

    <nav id="top-menu">
        <img src="images /pvrtransparent.png" class="nav-logo">
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="artists.html">Artists</a>
            <a href="releases.html">Releases</a>
            <a href="shop.html">Shop</a>
        </div>
    </nav>

    <div id="main-stage">
        <img src="images /pvrtransparent.png" id="main-logo" class="label-logo">

        <!-- Artist 1 -->
        <div class="scene">
            <div class="rip-wrapper">
                <div class="cover-half top-half" style="background-image:url('images /calmingdailyseries.png')"></div>
                <div class="cover-half bottom-half" style="background-image:url('images /calmingdailyseries.png')"></div>
            </div>
            <div class="artist-reveal">
                <img src="images /wilrhy.jpg">
                <h2>WILRHY</h2>
                <p>presents</p>
                <h3>CALMING DAILY SERIES</h3>
            </div>
        </div>

        <!-- Artist 2 -->
        <div class="scene">
            <div class="rip-wrapper">
                <div class="cover-half top-half" style="background-image:url('images /chaching.png')"></div>
                <div class="cover-half bottom-half" style="background-image:url('images /chaching.png')"></div>
            </div>
            <div class="artist-reveal">
                <img src="images /twistedanimations.jpg">
                <h2>TWISTEDANIMATIONS</h2>
                <p>presents</p>
                <h3>CHA-CHING</h3>
            </div>
        </div>

        <!-- Artist 3 -->
        <div class="scene">
            <div class="rip-wrapper">
                <div class="cover-half top-half" style="background-image:url('images /bfup.png')"></div>
                <div class="cover-half bottom-half" style="background-image:url('images /bfup.png')"></div>
            </div>
            <div class="artist-reveal">
                <img src="images /undyingbear.jpg">
                <h2>FROSTABILITY & WILRHY</h2>
                <p>presents</p>
                <h3>BFUP SOUNDTRACK</h3>
            </div>
        </div>

        <!-- Contact Section -->
        <div class="scene">
            <h1>PAPER VINYL RECORDS</h1>
            <p>For bookings and demos, reach out at:</p>
            <h3>papervinyl@musician.org</h3>
        </div>
    </div>

    <div id="scroll-track"></div>

    <script src="script.js"></script>
</body>
</html>
