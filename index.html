<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Vinyl Records</title>
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; }
        .scroll-tall { height: 700vh; } 
        
        .sticky-center {
            position: sticky; top: 0; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* --- THE LOGO --- */
        .label-logo {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 120px; /* Adjust size as needed */
            z-index: 100; /* Keeps it on top of everything */
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        .scene {
            position: absolute; opacity: 0; transition: opacity 0.5s;
            display: flex; flex-direction: column; align-items: center;
            width: 100%;
        }
        .scene.active { opacity: 1; }

        .rip-wrapper { position: relative; width: 400px; height: 400px; }
        
        .cover-half {
            position: absolute; width: 100%; height: 50%;
            background-size: 400px 400px;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .top { 
            top: 0; background-position: top;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 80% 92%, 60% 100%, 40% 92%, 20% 100%, 0 92%);
        }
        .bottom { 
            bottom: 0; background-position: bottom;
            clip-path: polygon(0 8%, 20% 0, 40% 8%, 60% 0, 80% 8%, 100% 0, 100% 100%, 0 100%);
        }

        .ripped .top { transform: translateY(-130%) rotate(-12deg); opacity: 0; }
        .ripped .bottom { transform: translateY(130%) rotate(12deg); opacity: 0; }

        .artist-reveal {
            position: absolute; z-index: -1; text-align: center;
            transform: scale(0.9); transition: 0.8s; opacity: 0;
        }
        .ripped + .artist-reveal { transform: scale(1); opacity: 1; }
        .artist-reveal img { width: 350px; border-radius: 2px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="scroll-tall">
    <div class="sticky-center">
        
        <!-- Constant Label Logo -->
        <img src="images /pvr.png" class="label-logo" alt="Paper Vinyl Records">

        <!-- Artist 1 -->
        <div class="scene">
            <div class="rip-wrapper">
                <div class="cover-half top" style="background-image:url('ARTIST_1_COVER_URL')"></div>
                <div class="cover-half bottom" style="background-image:url('ARTIST_1_COVER_URL')"></div>
            </div>
            <div class="artist-reveal">
                <img src="ARTIST_1_PHOTO_URL">
                <h2>ARTIST ONE</h2>
                <h2>presents</h2>
                <h2>ALBUM ONE</h2>
            </div>
        </div>

        <!-- Artist 2 -->
        <div class="scene">
            <div class="rip-wrapper">
                <div class="cover-half top" style="background-image:url('ARTIST_2_COVER_URL')"></div>
                <div class="cover-half bottom" style="background-image:url('ARTIST_2_COVER_URL')"></div>
            </div>
            <div class="artist-reveal">
                <img src="ARTIST_2_PHOTO_URL">
                <h2>ARTIST TWO</h2>
                <h2>presents</h2>
                <h2>ALBUM TWO</h2>
            </div>
        </div>

        <!-- Artist 3 -->
        <div class="scene">
            <div class="rip-wrapper">
                <div class="cover-half top" style="background-image:url('ARTIST_3_COVER_URL')"></div>
                <div class="cover-half bottom" style="background-image:url('ARTIST_3_COVER_URL')"></div>
            </div>
            <div class="artist-reveal">
                <img src="ARTIST_3_PHOTO_URL">
                <h2>ARTIST THREE</h2>
                <h2>presents</h2>
                <h2>ALBUM THREE</h2>
            </div>
        </div>

        <!-- Contact Section -->
        <div class="scene">
            <h1>Paper Vinyl Records</h1>
            <p>Demo Submissions: papervinyl@musician.org</p>
        </div>
    </div>
</div>

<script>
const scenes = document.querySelectorAll('.scene');

window.addEventListener('scroll', () => {
    const scrollFraction = window.scrollY / (document.body.scrollHeight - window.innerHeight);
    
    scenes.forEach((scene, index) => {
        const start = index / scenes.length;
        const end = (index + 1) / scenes.length;

        if (scrollFraction >= start && scrollFraction < end) {
            scene.classList.add('active');
            const sceneProgress = (scrollFraction - start) / (end - start);
            const ripWrapper = scene.querySelector('.rip-wrapper');
            
            if (ripWrapper && sceneProgress > 0.35) {
                ripWrapper.classList.add('ripped');
            } else if (ripWrapper) {
                ripWrapper.classList.remove('ripped');
            }
        } else {
            scene.classList.remove('active');
        }
    });
});
</script>
            
</body>
</html>
