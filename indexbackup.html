<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Vinyl Records</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%;
            background-color: rgb(30, 45, 40);
            color: white; font-family: 'Courier New', Courier, monospace;
        }

        #entry-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; 
            background: #121212; z-index: 1000; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            transition: opacity 0.8s ease; pointer-events: none;
        }

        #stage {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            z-index: 10; pointer-events: none;
        }

        #scroll-proxy { height: 1000vh; width: 100%; }

        /* UPDATED MENU LOGO SIZE */
        #top-menu {
            position: fixed; top: -100px; left: 0; width: 100%; height: 70px;
            background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 50px; z-index: 100; transition: top 0.6s ease; box-sizing: border-box;
            pointer-events: all; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        #top-menu.visible { top: 0; }
        
        .nav-logo { height: 35px; } /* Reduced from 45px */

        .nav-links { display: flex; align-items: center; }
        .nav-links a:link, .nav-links a:visited { color: white !important; text-decoration: none; margin-left: 25px; text-transform: uppercase; font-size: 0.8rem; }
        .nav-links a:hover { color: #00ff00 !important; }

        /* Dropdown CSS in Index */
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content {
            display: none; position: absolute; top: 100%; left: 25px;
            background: rgba(18, 18, 18, 0.95); min-width: 150px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .dropdown-content a { margin-left: 0 !important; padding: 12px; display: block; font-size: 0.7rem; }
        .dropdown:hover .dropdown-content { display: block; }

        .label-logo { position: absolute; top: 30px; left: 30px; width: 100px; transition: 0.5s; opacity: 1; }
        .label-logo.hidden { opacity: 0; transform: translateY(-30px); }

        .scene {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: opacity 0.5s;
        }
        .scene.active { opacity: 1; visibility: visible; }

        .rip-wrapper { position: relative; width: 380px; height: 380px; pointer-events: none; }
        .cover-half { position: absolute; width: 100%; height: 50%; background-size: 380px 380px; transition: transform 0.8s ease; }
        .top-half { top: 0; clip-path: polygon(0 0, 100% 0, 100% 100%, 85% 90%, 70% 100%, 50% 90%, 30% 100%, 0 90%); }
        .bottom-half { bottom: 0; clip-path: polygon(0 10%, 30% 0, 50% 10%, 70% 0, 85% 10%, 100% 0, 100% 100%, 0 100%); }
        .ripped .top-half { transform: translateY(-130%) rotate(-8deg); }
        .ripped .bottom-half { transform: translateY(130%) rotate(8deg); }

        .artist-reveal { position: absolute; z-index: -1; text-align: center; opacity: 0; transform: scale(0.85); transition: 0.8s; }
        .ripped + .artist-reveal { opacity: 1; transform: scale(1); }
        .artist-reveal img { width: 320px; border-radius: 4px; }
    </style>
</head>
<body>

    <audio id="vinyl-crackle" src="crackle.mp3" loop crossorigin="anonymous"></audio>

    <div id="entry-screen">
        <h1 style="letter-spacing: 5px;">SCROLL TO ENTER</h1>
        <p style="opacity: 0.5;">PAPER VINYL RECORDS</p>
    </div>

    <nav id="top-menu">
        <img src="images /pvrtransparent.png" class="nav-logo">
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="artists.html">Artists</a>
            <div class="dropdown">
                <a href="about.html">About</a>
                <div class="dropdown-content">
                    <a href="about.html">About PVR</a>
                    <a href="team.html">Our Team</a>
                </div>
            </div>
            <a href="shop.html">Shop</a>
        </div>
    </nav>

    <div id="stage">
        <img src="images /pvrtransparent.png" id="main-logo" class="label-logo">

        <!-- Artist 1 -->
        <div class="scene">
            <div class="rip-wrapper">
                <div class="cover-half top-half" style="background-image:url('images /calmingdailyseries.png')"></div>
                <div class="cover-half bottom-half" style="background-image:url('images /calmingdailyseries.png')"></div>
            </div>
            <div class="artist-reveal">
                <img src="images /wilrhy.jpg">
                <h2>WILRHY</h2>
                <p>presents</p>
                <h3>CALMING DAILY SERIES</h3>
            </div>
        </div>

        <!-- Artist 2 -->
        <div class="scene">
            <div class="rip-wrapper">
                <div class="cover-half top-half" style="background-image:url('images /chaching.png')"></div>
                <div class="cover-half bottom-half" style="background-image:url('images /chaching.png')"></div>
            </div>
            <div class="artist-reveal">
                <img src="images /twistedanimations.jpg">
                <h2>TWISTEDANIMATIONS</h2>
                <p>presents</p>
                <h3>CHA-CHING</h3>
            </div>
        </div>

        <!-- Artist 3 -->
        <div class="scene">
            <div class="rip-wrapper">
                <div class="cover-half top-half" style="background-image:url('images /bfup.png')"></div>
                <div class="cover-half bottom-half" style="background-image:url('images /bfup.png')"></div>
            </div>
            <div class="artist-reveal">
                <img src="images /frostability.jpg">
                <h2>FROSTABILITY & WILRHY</h2>
                <p>present</p>
                <h3>BFUP SOUNDTRACK</h3>
            </div>
        </div>

        <div class="scene">
            <h1 style="letter-spacing: 5px;">PAPER VINYL RECORDS</h1>
            <p style="opacity: 0.8; max-width: 400px; text-align: center;">Label Mission Placeholder</p>
            <h3 style="margin-top: 30px;">papervinyl@musician.org</h3>
        </div>
    </div>

    <div id="scroll-proxy"></div>

    <script src="script.js"></script>
</body>
</html>
