<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-Save | Paper Vinyl Records</title>
    <style>
        body { margin:0; padding:0; width:100%; height:100vh; background-color:#1a2630; color:white; font-family:'Courier New', Courier, monospace; display:flex; justify-content:center; align-items:center; overflow:hidden; text-align:center; } 
        #top-menu { position:fixed; top:0; left:0; width:100%; height:70px; background:rgba(18, 18, 18, 0.7); backdrop-filter:blur(15px); border-bottom:1px solid rgba(255, 255, 255, 0.1); display:flex; justify-content:space-between; align-items:center; padding:0 50px; z-index:300; box-sizing:border-box; } 
        .nav-logo { height:35px; } 
        .nav-links a { color:white; text-decoration:none; margin-left:20px; text-transform:uppercase; font-size:0.85rem; } 
        .presave-container { display:block; z-index:10; padding:30px; background:rgba(26, 26, 26, 0.6); backdrop-filter:blur(10px); border-radius:4px; max-width:450px; width:90%; box-shadow:0 20px 50px rgba(0,0,0,0.5); border:1px solid rgba(255, 255, 255, 0.05); } 
        .album-art { width:220px; height:220px; object-fit:cover; margin:0 auto 25px; display:block; border-radius:2px; box-shadow:0 10px 25px rgba(0,0,0,0.6); } 
        h1 { font-size:1.6rem; margin:0 0 5px; text-transform:uppercase; letter-spacing:2px; } 
        .artist-name { font-size:0.95rem; opacity:0.6; text-transform:uppercase; letter-spacing:1px; margin-bottom:25px; } 
        .action-btn { display:flex; align-items:center; justify-content:space-between; width:100%; padding:15px 20px; margin-bottom:15px; background:#e0e0e0; color:#121212; border:none; border-radius:4px; text-transform:uppercase; font-family:inherit; font-size:0.85rem; font-weight:bold; letter-spacing:1px; cursor:pointer; transition:all 0.3s ease; box-sizing:border-box; } 
        .action-btn svg { width:24px; height:24px; fill:#121212; }
        .spotify-btn:hover { background:#1DB954; color:white; } 
        .spotify-btn:hover svg { fill:white; } 
        .sc-btn:hover { background:#FF5500; color:white; } 
        .sc-btn:hover svg { fill:white; } 
        #error-container { display:none; z-index:10; padding:40px; background:rgba(30, 20, 20, 0.8); backdrop-filter:blur(10px); border-radius:4px; max-width:500px; width:90%; box-shadow:0 20px 50px rgba(0,0,0,0.5); border:1px solid rgba(255, 0, 0, 0.15); }
        .error-title { color:#ff4444; font-size:1.1rem; letter-spacing:2px; text-transform:uppercase; margin-bottom:15px; }
        .error-text { font-size:0.95rem; opacity:0.8; line-height:1.6; }
        .form-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:400; justify-content:center; align-items:center; } 
        .form-box { background:#e0e0e0; color:#121212; padding:30px; width:90%; max-width:400px; border-radius:4px; text-align:left; position:relative; } 
        .form-box h3 { margin:0 0 10px; text-transform:uppercase; letter-spacing:1px; } 
        .form-box p { font-size:0.85rem; margin-bottom:20px; opacity:0.8; } 
        .form-box input { width:100%; padding:12px; margin-bottom:15px; border:1px solid #999; border-radius:4px; box-sizing:border-box; font-family:inherit; } 
        .submit-btn { width:100%; padding:12px; background:#121212; color:white; border:none; border-radius:4px; text-transform:uppercase; font-weight:bold; cursor:pointer; font-family:inherit; } 
        .submit-btn:hover { background:#333; } 
        .close-form { position:absolute; top:10px; right:15px; font-size:24px; cursor: pointer; } 
        .success-message { color:#00ff00; font-size:0.9rem; margin-top:15px; display:none; text-transform:uppercase; } 
    </style> 
</head> 
<body>

        <img src="images /pvrtransparent.png" class="nav-logo"> 
        <div class="nav-links"> 
            <a href="index.html">Home</a> 
            <a href="artists.html">Artists</a> 
            <a href="about.html">About</a> 
            <a href="shop.html">Shop</a>

    <div class="presave-container" id="main-stage"> 
        <img class="album-art" src="images /musicmayhem2026.png" alt="Music Mayhem 2026 Art"> 
        <h1>Music Mayhem 2026</h1> 
        <div class="artist-name">BadMicGames</div>

        <div id="status-msg" class="success-message"></div> 
    </div> 
    <div id="error-container">
        <div class="error-title">error code: 🗣️</div>
        <div class="error-text">This artist currently does not have an upcoming release.</div>
    </div>
    <div id="form-overlay" class="form-overlay" onclick="closeForm()"> 
        <div class="form-box" onclick="event.stopPropagation()"> 
            <span class="close-form" onclick="closeForm()">&times;</span> 
            <h3 id="form-title">Pre-Save</h3> 
            <p>Enter details to follow this release. We'll secure your pre-save slot.</p> 
            <form id="presave-form" onsubmit="submitForm(event)"> 
                <input type="hidden" name="Artist" value="BadMicGames"> 
                <input type="hidden" name="Release" value="Music Mayhem 2026"> 
                <input type="hidden" name="Platform" id="hidden-platform"> 
                <input type="email" name="Email" id="fan-email" placeholder="YOUR EMAIL ADDRESS" required> 
                <button type="submit" class="submit-btn">Confirm Pre-Save</button> 
            </form> 
        </div> 
    </div> 
    <script> 
        function checkUrlParameter() {
            var urlParams = new URLSearchParams(window.location.search);
            var artistKey = urlParams.get('artist');
            var stage = document.getElementById('main-stage');
            var errorBox = document.getElementById('error-container');
            if (artistKey === 'badmicgames' || !artistKey) {
                stage.style.display = 'block';
                errorBox.style.display = 'none';
                document.body.style.backgroundColor = '#1a2630';
            } else {
                stage.style.display = 'none';
                errorBox.style.display = 'block';
                document.body.style.backgroundColor = '#1c1414'; 
            }
        }
        window.addEventListener('DOMContentLoaded', checkUrlParameter);
        function openForm(platform) { 
            document.getElementById('form-title').innerText = 'Pre-Save via ' + platform; 
            document.getElementById('hidden-platform').value = platform; 
            document.getElementById('form-overlay').style.display = 'flex'; 
        } 
        function closeForm() { 
            document.getElementById('form-overlay').style.display = 'none'; 
        } 
        function handleResponse(res) {
            if (res.ok) {
                closeForm();
                document.getElementById('status-msg').innerText = "Confirmed! Check your inbox on launch day.";
                document.getElementById('status-msg').style.display = 'block';
                document.getElementById('presave-form').reset();
            } else {
                alert("Submission Error.");
            }
        }
        function submitForm(e) { 
            e.preventDefault(); 
            var form = document.getElementById('presave-form'); 
            var endpoint = "https://formspree.io"; 
            fetch(endpoint, { 
                method: "POST", 
                body: new FormData(form), 
                headers: { 'Accept': 'application/json' } 
            }).then(handleResponse).catch(function(err) { alert("Network error."); }); 
        } 
    </script>
