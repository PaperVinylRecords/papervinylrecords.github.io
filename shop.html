<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Paper Vinyl Records</title>
    <style>
        /* --- GLOBAL --- */
        body {
            margin: 0;
            padding: 0;
            background: #121212;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        /* --- BLUR MENU (Matches your other live pages) --- */
        #top-menu {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 70px;
            background: rgba(18, 18, 18, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 50px; z-index: 300; box-sizing: border-box;
        }
        .nav-logo { height: 35px; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { color: white !important; text-decoration: none; margin-left: 20px; text-transform: uppercase; font-size: 0.85rem; }
        .nav-links a:hover { color: #00ff00 !important; }

        /* DROPDOWN MENU */
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content {
            display: none; position: absolute; top: 100%; left: 20px;
            background: rgba(18, 18, 18, 0.95); min-width: 160px;
            border: 1px solid rgba(255, 255, 255, 0.1); z-index: 500;
        }
        .dropdown-content a { padding: 12px 16px; margin: 0 !important; display: block; font-size: 0.75rem; }
        .dropdown:hover .dropdown-content { display: block; }

        /* --- SPLASH CONTAINER --- */
        .splash-container {
            z-index: 2;
            padding: 20px;
            margin-top: 70px; /* Accounts for fixed header */
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-weight: 300;
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            max-width: 450px;
            margin: 0 auto 30px;
            opacity: 0.7;
        }

        /* --- SPINNING VINYL VISUAL --- */
        .vinyl-visual {
            width: 120px;
            height: 120px;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: spin 8s linear infinite;
        }

        .vinyl-center {
            width: 30px;
            height: 30px;
            background: #121212;
            border: 2px solid #00ff00; /* Logo Neon Green */
            border-radius: 50%;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- PERSISTENT NAVIGATION -->
    <nav id="top-menu">
        <img src="images /pvrtransparent.png" class="nav-logo">
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="artists.html">Artists</a>
            <div class="dropdown">
                <a href="about.html" class="dropbtn">About</a>
                <div class="dropdown-content">
                    <a href="about.html">About PVR</a>
                </div>
            </div>
            <a href="shop.html">Shop</a>
        </div>
    </nav>

    <!-- CONTENT DISPLAY -->
    <div class="splash-container">
        <div class="vinyl-visual">
            <div class="vinyl-center"></div>
        </div>
        <h1>PVR Supply</h1>
        <p>
            Physical distribution, customized wax editions, and artist merch lines are currently processing. 
        </p>
        <p style="font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; color: #00ff00;">
            Coming Soon
        </p>
    </div>

</body>
</html>
